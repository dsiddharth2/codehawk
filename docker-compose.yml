version: "3.9"

# Local development docker-compose for codehawk
# Usage:
#   VCS=ado PR_ID=123 REPO=MyRepo docker compose run --rm codehawk
#   DRY_RUN=1 VCS=github PR_ID=456 REPO=owner/repo docker compose run --rm codehawk

services:
  codehawk:
    build:
      context: .
      dockerfile: Dockerfile
    image: codehawk:local
    environment:
      # Required
      - PR_ID=${PR_ID}
      - REPO=${REPO}
      - VCS=${VCS:-ado}

      # OpenAI API key (required)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-o3}
      - MAX_TURNS=${MAX_TURNS:-40}

      # ADO auth (required for VCS=ado)
      - AZURE_DEVOPS_PAT=${ADO_PAT:-}
      - AZURE_DEVOPS_ORG=${ADO_ORG:-}
      - AZURE_DEVOPS_PROJECT=${ADO_PROJECT:-}
      - AZURE_DEVOPS_REPO=${REPO:-}
      - AUTH_MODE=${AUTH_MODE:-pat}

      # GitHub auth (required for VCS=github)
      - GH_TOKEN=${GH_TOKEN:-}

      # Optional
      - DRY_RUN=${DRY_RUN:-}
      - COMMIT_ID=${COMMIT_ID:-}
      - ENABLE_GRAPH=${ENABLE_GRAPH:-1}

    volumes:
      # Mount the repo under review at /workspace
      - ${WORKSPACE_PATH:-./}:/workspace:ro
      # Write findings back to host for inspection
      - ./findings-output:/workspace/.cr

    # Override entrypoint for debug shell access
    # Uncomment: entrypoint: ["/bin/bash"]
